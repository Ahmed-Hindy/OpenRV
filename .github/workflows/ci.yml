name: OpenRV

on:
  # Manual build entrypoint for all supported platforms. The reusable platform
  # workflows currently target the CY2025 Release build slice by disabling the
  # debug and full historical matrices here.
  workflow_dispatch:
    inputs:
      SKIP_DEPS_CACHE:
        description: 'Skip dependencies caching'
        required: true
        default: 'false'

jobs:
  linux:
    uses: ./.github/workflows/ci-linux.yml
    with:
      skip_deps_cache: ${{ inputs.SKIP_DEPS_CACHE || 'false' }}
      full_matrix: 'false'
      run_debug: 'false'

  macos:
    uses: ./.github/workflows/ci-macos.yml
    with:
      skip_deps_cache: ${{ inputs.SKIP_DEPS_CACHE || 'false' }}
      full_matrix: 'false'
      run_debug: 'false'

  windows:
    uses: ./.github/workflows/ci-windows.yml
    with:
      skip_deps_cache: ${{ inputs.SKIP_DEPS_CACHE || 'false' }}
      full_matrix: 'false'
      run_debug: 'false'
